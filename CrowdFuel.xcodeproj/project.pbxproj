			name = "Collect dSYMs";
			outputFileListPaths = (
			);
			outputPaths = (
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "# Collect dSYMs from Swift Package Manager frameworks\nif [ \"${CONFIGURATION}\" == \"Release\" ]; then\n    echo \"Collecting dSYMs for Release build...\"\n    \n    DSYM_DIR=\"${DWARF_DSYM_FOLDER_PATH}\"\n    mkdir -p \"${DSYM_DIR}\"\n    \n    # Find SPM package build directory\n    SOURCE_ROOT=\"${SRCROOT}\"\n    BUILD_DIR=\"${BUILD_DIR}\"\n    DERIVED_DATA=\"${BUILD_ROOT}/../../SourcePackages/checkouts\"\n    \n    # Method 1: Look in build products\n    find \"${BUILD_DIR}\" -name \"*.dSYM\" -type d 2>/dev/null | while read dsym_path; do\n        dsym_name=$(basename \"${dsym_path}\")\n        if [ ! -d \"${DSYM_DIR}/${dsym_name}\" ]; then\n            cp -R \"${dsym_path}\" \"${DSYM_DIR}/\"\n            echo \"Copied dSYM from build dir: ${dsym_name}\"\n        fi\n    done\n    \n    # Method 2: Look in SPM checkouts (if available)\n    if [ -d \"${DERIVED_DATA}\" ]; then\n        find \"${DERIVED_DATA}\" -name \"*.dSYM\" -type d 2>/dev/null | while read dsym_path; do\n            dsym_name=$(basename \"${dsym_path}\")\n            if [ ! -d \"${DSYM_DIR}/${dsym_name}\" ]; then\n                cp -R \"${dsym_path}\" \"${DSYM_DIR}/\"\n                echo \"Copied dSYM from SPM: ${dsym_name}\"\n            fi\n        done\n    fi\n    \n    # Method 3: Check Frameworks folder for embedded frameworks with dSYMs\n    FRAMEWORKS_DIR=\"${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}\"\n    if [ -d \"${FRAMEWORKS_DIR}\" ]; then\n        find \"${FRAMEWORKS_DIR}\" -name \"*.framework\" -type d | while read framework_path; do\n            framework_name=$(basename \"${framework_path}\" .framework)\n            dsym_source=\"${framework_path}/${framework_name}.dSYM\"\n            dsym_dest=\"${DSYM_DIR}/${framework_name}.framework.dSYM\"\n            \n            if [ -d \"${dsym_source}\" ] && [ ! -d \"${dsym_dest}\" ]; then\n                cp -R \"${dsym_source}\" \"${dsym_dest}\"\n                echo \"Copied framework dSYM: ${framework_name}\"\n            fi\n        done\n    fi\n    \n    echo \"dSYM collection complete. Found $(ls -1 \"${DSYM_DIR}\" 2>/dev/null | wc -l) dSYMs\"\nelse\n    echo \"Skipping dSYM collection for Debug build.\"\nfi\n";
		};
